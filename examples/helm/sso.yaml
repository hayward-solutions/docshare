# SSO-enabled Helm values for DocShare
#
# Usage:
#   helm install docshare oci://ghcr.io/hayward-solutions/charts/docshare \
#     --namespace docshare \
#     -f examples/helm/sso.yaml \
#     --set sso.google.clientSecret=$GOOGLE_CLIENT_SECRET \
#     --set sso.oidc.clientSecret=$OIDC_CLIENT_SECRET
#
# This file configures SSO with Google, GitHub, and OIDC (Keycloak/Authentik/Auth0/Okta/Azure AD).
# SAML and LDAP blocks are included but disabled — enable the ones you need.
#
# For OIDC, the chart only needs the issuer URL — endpoints are auto-discovered from
# {issuerUrl}/.well-known/openid-configuration and id_tokens are verified via the IdP's JWKS.

globals:
  webUrl: https://docshare.example.com
  apiUrl: https://docshare.example.com/api

api:
  replicaCount: 2

sso:
  autoRegister: true
  defaultRole: "user"

  google:
    enabled: true
    clientId: ""              # required when enabled
    clientSecret: ""          # pass via --set or sso.existingSecret
    scopes: "openid,email,profile"

  github:
    enabled: true
    clientId: ""
    clientSecret: ""
    scopes: "read:user,user:email"

  # Generic OIDC — works with Keycloak, Authentik, Auth0, Okta, Azure AD, Google Workspace, etc.
  oidc:
    enabled: true
    clientId: "docshare"
    clientSecret: ""
    issuerUrl: "https://keycloak.example.com/realms/docshare"
    scopes: "openid,profile,email"
    # skipIssuerVerification: true  # only if your IdP serves a mismatched `iss` claim

  saml:
    enabled: false
    idpMetadataUrl: "https://idp.example.com/metadata.xml"
    # spEntityId and spAcsUrl default to {globals.apiUrl} and {globals.apiUrl}/auth/sso/saml/acs

  ldap:
    enabled: false
    url: "ldap://ldap.example.com:389"
    bindDn: "cn=admin,dc=example,dc=com"
    bindPassword: ""
    searchBase: "dc=example,dc=com"
    userFilter: "(uid=%s)"
    emailField: "mail"
    nameFields: "givenName,sn"

  # Optional: reference an existing Secret containing client secrets / bind passwords.
  # Supported keys: OAUTH_GOOGLE_CLIENT_SECRET, OAUTH_GITHUB_CLIENT_SECRET,
  # OAUTH_OIDC_CLIENT_SECRET, LDAP_BIND_PASSWORD.
  # existingSecret: "docshare-sso"

web:
  replicaCount: 2

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
  hosts:
    - host: docshare.example.com
      paths:
        - path: /
          pathType: Prefix
          service: web
        - path: /api
          pathType: Prefix
          service: api
  tls:
    - secretName: docshare-tls
      hosts:
        - docshare.example.com

postgresql:
  enabled: true
  auth:
    username: docshare
    password: ""              # Set via --set
    database: docshare

s3:
  region: "us-east-1"
  bucket: "docshare"
