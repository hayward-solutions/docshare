api:
  replicaCount: 1
  image:
    repository: ghcr.io/hayward-solutions/docshare/api
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
  resources: {}
  env:
    dbSslmode: disable
    s3UseSsl: "true"
    jwtSecret: ""  # auto-generated if empty; set explicitly for production
    jwtExpirationHours: "24"
    serverPort: "8080"
    gotenbergUrl: ""  # auto-configured if gotenberg.enabled
  existingSecret: ""  # use an existing Secret instead of the auto-generated one

# Global values accessible to all components
globals:
  webUrl: ""  # public web URL (e.g., https://docshare.example.com); auto-configured from ingress if enabled
  apiUrl: ""  # public API URL (e.g., https://docshare.example.com/api); auto-configured from ingress if enabled

web:
  replicaCount: 1
  image:
    repository: ghcr.io/hayward-solutions/docshare/web
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3000
  resources: {}

gotenberg:
  enabled: true
  replicaCount: 1
  image:
    repository: gotenberg/gotenberg
    tag: "8"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3000
  resources: {}
  args:
    - "gotenberg"
    - "--api-timeout=120s"
    - "--libreoffice-restart-after=10"

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: docshare.local
      paths:
        - path: /
          pathType: Prefix
          service: web
        - path: /api
          pathType: Prefix
          service: api
  tls: []

postgresql:
  enabled: true
  auth:
    username: docshare
    password: docshare_secret
    database: docshare

s3:
  region: "us-east-1"
  endpoint: ""
  publicEndpoint: ""
  accessKey: ""
  secretKey: ""
  bucket: "docshare"
  useSsl: "true"
  existingSecret: ""
  existingSecretAccessKeyKey: "access-key"
  existingSecretSecretKeyKey: "secret-key"

externalDatabase:
  host: ""
  port: 5432
  user: docshare
  password: ""
  database: docshare
  sslmode: disable
  existingSecret: ""
  existingSecretPasswordKey: password

# Single sign-on configuration. All providers are disabled by default.
# Redirect URLs default to {globals.apiUrl}/auth/sso/oauth/{provider}/callback when omitted.
sso:
  autoRegister: true        # Auto-create users on first SSO login
  defaultRole: "user"       # Role assigned to auto-created users

  google:
    enabled: false
    clientId: ""
    clientSecret: ""        # Stored in the chart-managed Secret unless existingSecret is set
    redirectUrl: ""         # Optional override; default derived from globals.apiUrl
    scopes: "openid,email,profile"

  github:
    enabled: false
    clientId: ""
    clientSecret: ""
    redirectUrl: ""
    scopes: "read:user,user:email"

  # Generic OpenID Connect provider (Keycloak, Authentik, Auth0, Okta, Azure AD, etc.)
  # IssuerURL must point to the IdP base URL — endpoints are auto-discovered from
  # {issuerUrl}/.well-known/openid-configuration. The id_token is verified against the IdP's JWKS.
  oidc:
    enabled: false
    clientId: ""
    clientSecret: ""
    issuerUrl: ""           # e.g. https://keycloak.example.com/realms/docshare
    redirectUrl: ""
    scopes: "openid,profile,email"
    skipIssuerVerification: false  # Allow issuer mismatch (only for non-compliant IdPs)

  saml:
    enabled: false
    idpMetadataUrl: ""
    spEntityId: ""
    spAcsUrl: ""

  ldap:
    enabled: false
    url: "ldap://localhost:389"
    bindDn: ""
    bindPassword: ""
    searchBase: ""
    userFilter: "(uid=%s)"
    emailField: "mail"
    nameFields: "givenName,sn"

  # Reference an existing Secret for SSO credentials instead of storing them in values.
  # The Secret may contain any of: OAUTH_GOOGLE_CLIENT_SECRET, OAUTH_GITHUB_CLIENT_SECRET,
  # OAUTH_OIDC_CLIENT_SECRET, LDAP_BIND_PASSWORD. Keys not present fall back to chart values.
  existingSecret: ""
